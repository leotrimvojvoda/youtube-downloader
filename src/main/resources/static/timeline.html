<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Generate Timeline</title>
    <style>
        :root {
            --bg: #f4f6f9;
            --card: #ffffff;
            --border: #d9dee5;
            --text: #1c2430;
            --muted: #5b6673;
            --primary: #2456c4;
            --primary-hover: #1d4aa8;
            --error: #b3251e;
            --error-bg: #fdefee;
            --info-bg: #eef2fb;
            --radius: 8px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 20px 64px;
        }

        header { margin-bottom: 24px; }

        header h1 {
            margin: 0 0 4px;
            font-size: 22px;
            font-weight: 650;
            letter-spacing: -0.01em;
        }

        header p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
        }

        .back {
            display: inline-block;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--primary);
            text-decoration: none;
        }

        .back:hover { text-decoration: underline; }

        .field { margin-bottom: 18px; }
        .field:last-of-type { margin-bottom: 0; }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        label .optional {
            font-weight: 400;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 9px 12px;
            font: inherit;
            font-size: 14px;
            color: var(--text);
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input::placeholder { color: #9aa4b1; }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(36, 86, 196, 0.15);
        }

        .row { display: flex; gap: 14px; }
        .row .field { flex: 1; }

        .actions {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        button {
            width: 100%;
            padding: 10px 18px;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover:not(:disabled) { background: var(--primary-hover); }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        button.secondary {
            margin-top: 10px;
            color: var(--primary);
            background: #fff;
            border: 1px solid var(--border);
        }

        button.secondary:hover:not(:disabled) { background: var(--info-bg); }

        .error-card {
            display: none;
            margin-top: 16px;
            border: 1px solid #efc4c1;
            border-radius: var(--radius);
            background: var(--error-bg);
            padding: 16px 20px;
            font-size: 14px;
            color: var(--error);
        }

        .error-card.visible { display: block; }

        .player {
            display: none;
            margin-top: 16px;
            background: #000;
            border-radius: var(--radius);
            padding: 32px 24px 20px;
        }

        .player.visible { display: block; }

        .track {
            position: relative;
            height: 12px;
        }

        .track .line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            margin-top: -1px;
            background: #fff;
        }

        .track .dot {
            position: absolute;
            top: 50%;
            left: 0;
            width: 12px;
            height: 12px;
            margin: -6px 0 0 -6px;
            border-radius: 50%;
            background: #fff;
        }

        .times {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 13px;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
<div class="page">
    <a class="back" href="/">&larr; Back to downloader</a>
    <header>
        <h1>Generate Timeline</h1>
        <p>Simulate a media timeline with a start and end point.</p>
    </header>

    <form id="form" class="card">
        <div class="field">
            <label for="duration">Total duration</label>
            <input type="text" id="duration" placeholder="minutes, MM:SS or HH:MM:SS" required>
        </div>
        <div class="row">
            <div class="field">
                <label for="start">Start <span class="optional">— optional</span></label>
                <input type="text" id="start" placeholder="minutes, MM:SS or HH:MM:SS">
            </div>
            <div class="field">
                <label for="end">End <span class="optional">— optional</span></label>
                <input type="text" id="end" placeholder="minutes, MM:SS or HH:MM:SS">
            </div>
        </div>
        <div class="actions">
            <button type="submit">Generate</button>
            <button type="button" class="secondary" id="downloadBtn">Download video</button>
        </div>
    </form>

    <div class="error-card" id="errorCard"></div>

    <div class="player" id="player">
        <div class="track">
            <div class="line"></div>
            <div class="dot" id="dot"></div>
        </div>
        <div class="times">
            <span id="currentTime">00:00</span>
            <span id="totalTime">00:00</span>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('form');
    const errorCard = document.getElementById('errorCard');
    const player = document.getElementById('player');
    const dot = document.getElementById('dot');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    let timer = null;

    // Same convention as the downloader form: HH:MM:SS, MM:SS, or a bare number of minutes.
    function parseTime(str) {
        const parts = str.split(':');
        if (parts.length > 3 || parts.some(p => p.trim() === '' || !/^\d+$/.test(p.trim()))) {
            return null;
        }
        const nums = parts.map(p => parseInt(p, 10));
        if (nums.length === 1) return nums[0] * 60;
        if (nums.length === 2) return nums[0] * 60 + nums[1];
        return nums[0] * 3600 + nums[1] * 60 + nums[2];
    }

    function formatTime(secs, withHours) {
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        const pad = n => String(n).padStart(2, '0');
        return withHours ? pad(h) + ':' + pad(m) + ':' + pad(s) : pad(m) + ':' + pad(s);
    }

    // Validates the three inputs and returns {total, start, end} in seconds plus the raw
    // strings (sent to the server as-is), or null after showing an error.
    function readTimeline() {
        errorCard.classList.remove('visible');

        const durationStr = document.getElementById('duration').value.trim();
        const startStr = document.getElementById('start').value.trim();
        const endStr = document.getElementById('end').value.trim();

        const total = parseTime(durationStr);
        if (total == null || total <= 0) return showError('Invalid total duration. Use minutes, MM:SS or HH:MM:SS.');
        const start = startStr ? parseTime(startStr) : 0;
        if (start == null) return showError('Invalid start time. Use minutes, MM:SS or HH:MM:SS.');
        const end = endStr ? parseTime(endStr) : total;
        if (end == null) return showError('Invalid end time. Use minutes, MM:SS or HH:MM:SS.');
        if (end > total) return showError('End time must not be after the total duration.');
        if (start >= end) return showError('Start time must be before the end time.');

        return { total, start, end, durationStr, startStr, endStr };
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        clearInterval(timer);
        player.classList.remove('visible');

        const t = readTimeline();
        if (!t) return;
        const { total, start, end } = t;

        const withHours = total >= 3600;
        let current = start;
        totalTimeEl.textContent = formatTime(total, withHours);
        player.classList.add('visible');

        const render = () => {
            currentTimeEl.textContent = formatTime(current, withHours);
            dot.style.left = (current / total * 100) + '%';
        };
        render();

        timer = setInterval(() => {
            current++;
            render();
            if (current >= end) clearInterval(timer);
        }, 1000);
    });

    const downloadBtn = document.getElementById('downloadBtn');

    downloadBtn.addEventListener('click', async () => {
        const t = readTimeline();
        if (!t) return;

        downloadBtn.disabled = true;
        downloadBtn.textContent = 'Generating video…';
        try {
            const params = new URLSearchParams({ duration: t.durationStr });
            if (t.startStr) params.set('start', t.startStr);
            if (t.endStr) params.set('end', t.endStr);
            const res = await fetch('/api/timeline-video?' + params);
            if (!res.ok) {
                let msg = 'Failed to generate the video.';
                try { msg = (await res.json()).error || msg; } catch (ignored) {}
                showError(msg);
                return;
            }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const name = s => formatTime(s, t.total >= 3600).replaceAll(':', '-');
            a.href = url;
            a.download = 'timeline-' + name(t.start) + '-to-' + name(t.end) + '.mp4';
            a.click();
            URL.revokeObjectURL(url);
        } catch (err) {
            showError('Request failed: ' + err.message);
        } finally {
            downloadBtn.disabled = false;
            downloadBtn.textContent = 'Download video';
        }
    });

    function showError(msg) {
        errorCard.textContent = msg;
        errorCard.classList.add('visible');
    }
</script>
</body>
</html>
